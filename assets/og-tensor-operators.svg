<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05050b"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5c9ce6"/>
      <stop offset="100%" stop-color="#7eb4ee"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#ffd180"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="35%" r="40%">
      <stop offset="0%" stop-color="rgba(255,183,77,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Hierarchy tree -->
  <g transform="translate(700, 100)">
    <!-- Rank 0: Scalar (top) -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="#ffb74d" stroke-width="2" opacity="0.7"/>
    <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#ffb74d" opacity="0.7">k=0</text>
    <!-- Connections -->
    <line x1="-15" y1="24" x2="-80" y2="86" stroke="rgba(92,156,230,0.15)" stroke-width="1"/>
    <line x1="15" y1="24" x2="80" y2="86" stroke="rgba(92,156,230,0.15)" stroke-width="1"/>
    <!-- Rank 1: Vector -->
    <circle cx="-80" cy="110" r="28" fill="none" stroke="#5c9ce6" stroke-width="2" opacity="0.6"/>
    <text x="-80" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#5c9ce6" opacity="0.7">k=1</text>
    <circle cx="80" cy="110" r="28" fill="none" stroke="#5c9ce6" stroke-width="2" opacity="0.6"/>
    <text x="80" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5c9ce6" opacity="0.5">vector</text>
    <!-- Connections -->
    <line x1="-100" y1="138" x2="-160" y2="196" stroke="rgba(230,140,216,0.12)" stroke-width="1"/>
    <line x1="-60" y1="138" x2="0" y2="196" stroke="rgba(230,140,216,0.12)" stroke-width="1"/>
    <line x1="60" y1="138" x2="0" y2="196" stroke="rgba(230,140,216,0.12)" stroke-width="1"/>
    <line x1="100" y1="138" x2="160" y2="196" stroke="rgba(230,140,216,0.12)" stroke-width="1"/>
    <!-- Rank 2: Quadrupole -->
    <circle cx="-160" cy="220" r="32" fill="none" stroke="#e68cd8" stroke-width="1.5" opacity="0.5"/>
    <text x="-160" y="226" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#e68cd8" opacity="0.5">k=2</text>
    <circle cx="0" cy="220" r="32" fill="none" stroke="#e68cd8" stroke-width="1.5" opacity="0.5"/>
    <circle cx="160" cy="220" r="32" fill="none" stroke="#e68cd8" stroke-width="1.5" opacity="0.5"/>
    <!-- Dots for higher ranks -->
    <text x="-160" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="rgba(230,140,216,0.2)">...</text>
    <text x="0" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="rgba(230,140,216,0.2)">...</text>
    <text x="160" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="rgba(230,140,216,0.2)">...</text>
  </g>
  <!-- Rotation arrows around hierarchy -->
  <g transform="translate(700,210)" opacity="0.12">
    <path d="M-250,-30 A250,100 0 0,1 250,-30" fill="none" stroke="#ffb74d" stroke-width="1.5"/>
    <path d="M245,-25 L255,-30 L245,-35" fill="none" stroke="#ffb74d" stroke-width="1.5"/>
    <text x="260" y="-25" font-family="Georgia, serif" font-size="14" fill="#ffb74d" font-style="italic">R(α,β,γ)</text>
  </g>
  <!-- Floating formulas -->
  <text x="130" y="180" font-family="Georgia, serif" font-size="18" fill="rgba(92,156,230,0.15)" font-style="italic">D^(k)_{q'q}(R)</text>
  <text x="100" y="320" font-family="Georgia, serif" font-size="16" fill="rgba(230,140,216,0.12)" font-style="italic">⟨j'||T⁽ᵏ⁾||j⟩</text>
  <text x="150" y="250" font-family="Georgia, serif" font-size="14" fill="rgba(255,183,77,0.1)" font-style="italic">Wigner-Eckart</text>
  <!-- Branding -->
  <text x="80" y="80" font-family="monospace" font-size="16" letter-spacing="6" fill="rgba(92,156,230,0.5)">DEEPEXPLAIN</text>
  <!-- Title -->
  <text x="80" y="510" font-family="Georgia, serif" font-size="42" font-weight="600" fill="#e8e8f0">Tensor Operators</text>
  <text x="80" y="560" font-family="Georgia, serif" font-size="28" fill="#7e7ea0">The Hierarchy Under Rotations</text>
  <!-- Equation -->
  <text x="800" y="80" font-family="Georgia, serif" font-size="18" fill="rgba(230,140,216,0.4)" font-style="italic">R T⁽ᵏ⁾_q R† = Σ D⁽ᵏ⁾_{q'q} T⁽ᵏ⁾_{q'}</text>
  <!-- Border accent -->
  <rect x="0" y="0" width="4" height="630" fill="url(#blue)" opacity="0.6"/>
</svg>