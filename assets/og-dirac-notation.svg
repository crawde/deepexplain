<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05050b"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5c9ce6"/>
      <stop offset="100%" stop-color="#7eb4ee"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e68cd8"/>
      <stop offset="100%" stop-color="#f0a8e4"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="40%" r="40%">
      <stop offset="0%" stop-color="rgba(92,156,230,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Bloch sphere wireframe -->
  <g transform="translate(750, 260)">
    <!-- Sphere outline -->
    <ellipse cx="0" cy="0" rx="160" ry="160" fill="none" stroke="rgba(92,156,230,0.15)" stroke-width="1.5"/>
    <!-- Equator ellipse -->
    <ellipse cx="0" cy="0" rx="160" ry="50" fill="none" stroke="rgba(92,156,230,0.12)" stroke-width="1" stroke-dasharray="6,4"/>
    <!-- Meridian -->
    <ellipse cx="0" cy="0" rx="50" ry="160" fill="none" stroke="rgba(92,156,230,0.08)" stroke-width="1" stroke-dasharray="6,4"/>
    <!-- Axes -->
    <line x1="0" y1="-180" x2="0" y2="180" stroke="rgba(92,156,230,0.1)" stroke-width="0.8"/>
    <line x1="-180" y1="0" x2="180" y2="0" stroke="rgba(92,156,230,0.1)" stroke-width="0.8"/>
    <!-- State vector arrow -->
    <line x1="0" y1="0" x2="80" y2="-120" stroke="url(#pink)" stroke-width="2.5" opacity="0.9"/>
    <circle cx="80" cy="-120" r="5" fill="#e68cd8" opacity="0.9"/>
    <!-- Labels -->
    <text x="8" y="-170" font-family="Georgia, serif" font-size="16" fill="rgba(92,156,230,0.5)" font-style="italic">|0⟩</text>
    <text x="8" y="195" font-family="Georgia, serif" font-size="16" fill="rgba(92,156,230,0.5)" font-style="italic">|1⟩</text>
    <text x="90" y="-115" font-family="Georgia, serif" font-size="14" fill="rgba(230,140,216,0.7)" font-style="italic">|ψ⟩</text>
    <!-- Angle arcs -->
    <path d="M0,-40 A40,40 0 0,1 20,-35" fill="none" stroke="rgba(255,183,77,0.4)" stroke-width="1.5"/>
    <text x="28" y="-30" font-family="Georgia, serif" font-size="12" fill="rgba(255,183,77,0.5)" font-style="italic">θ</text>
  </g>
  <!-- Large ket notation -->
  <g opacity="0.15">
    <text x="120" y="300" font-family="Georgia, serif" font-size="120" fill="#5c9ce6" font-style="italic">⟨ψ|φ⟩</text>
  </g>
  <!-- Floating notation -->
  <text x="160" y="180" font-family="Georgia, serif" font-size="20" fill="rgba(230,140,216,0.2)" font-style="italic">|+⟩ = (|0⟩ + |1⟩)/√2</text>
  <text x="200" y="400" font-family="Georgia, serif" font-size="18" fill="rgba(92,156,230,0.15)" font-style="italic">A = Σᵢ aᵢ|aᵢ⟩⟨aᵢ|</text>
  <!-- Branding -->
  <text x="80" y="80" font-family="monospace" font-size="16" letter-spacing="6" fill="rgba(92,156,230,0.5)">DEEPEXPLAIN</text>
  <!-- Title -->
  <text x="80" y="530" font-family="Georgia, serif" font-size="42" font-weight="600" fill="#e8e8f0">Dirac Notation</text>
  <text x="80" y="580" font-family="Georgia, serif" font-size="28" fill="#7e7ea0">The Complete Interactive Guide</text>
  <!-- Equation top-right -->
  <text x="900" y="80" font-family="Georgia, serif" font-size="18" fill="rgba(230,140,216,0.4)" font-style="italic">|ψ⟩ = cos(θ/2)|0⟩ + e^(iφ) sin(θ/2)|1⟩</text>
  <!-- Border accent -->
  <rect x="0" y="0" width="4" height="630" fill="url(#blue)" opacity="0.6"/>
</svg>